filebeat.inputs:
- type: filestream
  id: default-filestream
  paths:
    - ingest_data/*.log
  parsers:
      - ndjson:
          target: ""
          overwrite_keys: true


setup.kibana:
  host: ${KIBANA_HOSTS}
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}

output.logstash:
  hosts: ["logstash01"]
